name: Build and Publish Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install robomotion-go SDK
        run: |
          git clone https://github.com/robomotionio/robomotion-go.git /opt/robomotion-go
          cd /opt/robomotion-go && go mod tidy

      - name: Replace local SDK reference
        run: |
          go mod edit -replace github.com/robomotionio/robomotion-go=/opt/robomotion-go
          go mod tidy

      - name: Build for all platforms
        run: |
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -o dist/robomotion-roundups
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o dist/robomotion-roundups.exe
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -o dist/robomotion-roundups-darwin-amd64
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -o dist/robomotion-roundups-darwin-arm64

      - name: Copy config
        run: cp config.json dist/config.json

      - name: Generate spec file
        run: |
          NAMESPACE=$(jq -r '.namespace' config.json)
          VERSION=$(jq -r '.version' config.json)
          SPEC_FILE="${NAMESPACE}-${VERSION}.pspec"
          chmod +x dist/robomotion-roundups
          dist/robomotion-roundups -s > "dist/${SPEC_FILE}"

      - name: Package into .tgz
        run: |
          cd dist && tar -czf robomotion-roundups.tgz config.json robomotion-roundups robomotion-roundups.exe robomotion-roundups-darwin-*

      - name: Generate index
        run: |
          cd dist
          GENERATED=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          NAME=$(jq -r '.name' ../config.json)
          NAMESPACE=$(jq -r '.namespace' ../config.json)
          VERSION=$(jq -r '.version' ../config.json)
          SPEC_FILE="${NAMESPACE}-${VERSION}.pspec"
          PACKAGE_KEY=$(printf '%s' "$NAMESPACE" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '.')
          AUTHOR=$(jq -c '.author // null' ../config.json)
          CATEGORIES=$(jq -c '.categories // []' ../config.json)
          CATEGORY=$(jq -c '.category // null' ../config.json)
          DESCRIPTION=$(jq -c '.description // null' ../config.json)
          ICON=$(jq -c '.icon // null' ../config.json)
          KEYWORDS=$(jq -c '.keywords // []' ../config.json)
          LANGUAGE=$(jq -c '.language // null' ../config.json)
          PLATFORMS=$(jq -c '.platforms // []' ../config.json)
          if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            TAG_VERSION="${GITHUB_REF#refs/tags/v}"
            if [[ "$TAG_VERSION" != "$VERSION" ]]; then
              echo "Tag version ($TAG_VERSION) does not match config.json version ($VERSION)" >&2
              exit 1
            fi
          fi
          SHA=$(sha256sum robomotion-roundups.tgz | awk '{print $1}')
          SIZE=$(stat -c%s robomotion-roundups.tgz)
          SPEC_SHA=$(sha256sum "$SPEC_FILE" | awk '{print $1}')
          SPEC_SIZE=$(stat -c%s "$SPEC_FILE")
          jq -n \
            --arg generated "$GENERATED" \
            --arg name "$NAME" \
            --arg namespace "$NAMESPACE" \
            --arg packageKey "$PACKAGE_KEY" \
            --arg spec "$SPEC_FILE" \
            --arg specSha "$SPEC_SHA" --argjson specSize "$SPEC_SIZE" \
            --arg tgz "robomotion-roundups.tgz" \
            --arg tgzSha "$SHA" --argjson tgzSize "$SIZE" \
            --arg version "$VERSION" \
            --argjson author "$AUTHOR" \
            --argjson categories "$CATEGORIES" \
            --argjson category "$CATEGORY" \
            --argjson description "$DESCRIPTION" \
            --argjson icon "$ICON" \
            --argjson keywords "$KEYWORDS" \
            --argjson language "$LANGUAGE" \
            --argjson platforms "$PLATFORMS" \
            '{
              generated: $generated,
              packages: {
                ($packageKey): {
                  author: $author,
                  categories: $categories,
                  category: $category,
                  description: $description,
                  icon: $icon,
                  keywords: $keywords,
                  language: $language,
                  name: $name,
                  namespace: $namespace,
                  path: "",
                  platforms: $platforms,
                  version: $version,
                  versions: [$version],
                  spec: $spec,
                  specSha256: $specSha,
                  specSize: $specSize,
                  filename: $tgz,
                  sha256: $tgzSha,
                  size: $tgzSize
                }
              }
            }' > index.json
          sha256sum index.json > index.sha256sum

      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
