name: Build and Publish Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install robomotion-go SDK
        run: |
          git clone https://github.com/robomotionio/robomotion-go.git /opt/robomotion-go
          cd /opt/robomotion-go && go mod tidy

      - name: Replace local SDK reference
        run: |
          go mod edit -replace github.com/robomotionio/robomotion-go=/opt/robomotion-go
          go mod tidy

      - name: Build for all platforms
        run: |
          GOOS=linux   GOARCH=amd64 go build -o dist/pkg-linux-amd64
          GOOS=windows GOARCH=amd64 go build -o dist/pkg-windows-amd64.exe
          GOOS=darwin  GOARCH=amd64 go build -o dist/pkg-darwin-amd64
          GOOS=darwin  GOARCH=arm64 go build -o dist/pkg-darwin-arm64

      - name: Package into .tgz
        run: |
          cd dist && tar -czf package.tgz pkg-*

      - name: Generate index
        run: |
          cd dist
          echo '{"packages":[]}' > index.json
          for tgz in *.tgz; do
            SHA=$(sha256sum "$tgz" | awk '{print $1}')
            SIZE=$(stat -c%s "$tgz")
            jq --arg name "$tgz" --arg sha "$SHA" --argjson size "$SIZE" \
              '.packages += [{"filename":$name,"sha256":$sha,"size":$size}]' \
              index.json > index.tmp && mv index.tmp index.json
          done
          sha256sum index.json > index.sha256sum

      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
