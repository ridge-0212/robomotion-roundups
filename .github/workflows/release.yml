name: Build and Publish Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install robomotion-go SDK
        run: |
          git clone https://github.com/robomotionio/robomotion-go.git /opt/robomotion-go
          cd /opt/robomotion-go && go mod tidy

      - name: Replace local SDK reference
        run: |
          go mod edit -replace github.com/robomotionio/robomotion-go=/opt/robomotion-go
          go mod tidy

      - name: Build for all platforms
        run: |
          GOOS=linux   GOARCH=amd64 go build -o dist/robomotion-roundups
          GOOS=windows GOARCH=amd64 go build -o dist/robomotion-roundups.exe
          GOOS=darwin  GOARCH=amd64 go build -o dist/robomotion-roundups-darwin-amd64
          GOOS=darwin  GOARCH=arm64 go build -o dist/robomotion-roundups-darwin-arm64

      - name: Copy config
        run: cp config.json dist/config.json

      - name: Generate spec file
        run: |
          chmod +x dist/robomotion-roundups
          dist/robomotion-roundups -s > dist/robomotion-roundups.pspec

      - name: Package into .tgz
        run: |
          cd dist && tar -czf package.tgz config.json robomotion-roundups robomotion-roundups.exe robomotion-roundups-darwin-*

      - name: Generate index
        run: |
          cd dist
          SHA=$(sha256sum package.tgz | awk '{print $1}')
          SIZE=$(stat -c%s package.tgz)
          SPEC_SHA=$(sha256sum robomotion-roundups.pspec | awk '{print $1}')
          SPEC_SIZE=$(stat -c%s robomotion-roundups.pspec)
          jq -n \
            --arg spec "robomotion-roundups.pspec" \
            --arg specSha "$SPEC_SHA" --argjson specSize "$SPEC_SIZE" \
            --arg tgz "package.tgz" \
            --arg tgzSha "$SHA" --argjson tgzSize "$SIZE" \
            '{
              packages: [{
                name: "Roundups AI",
                namespace: "Robomotion.Roundups",
                version: "1.0.0",
                spec: $spec,
                specSha256: $specSha,
                specSize: $specSize,
                filename: $tgz,
                sha256: $tgzSha,
                size: $tgzSize
              }]
            }' > index.json
          sha256sum index.json > index.sha256sum

      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
